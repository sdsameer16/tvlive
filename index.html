<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial;
}

/* container */

.video-container{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* zoomed youtube video */

.video-container iframe{
    position:absolute;
    top:50%;
    left:50%;
    width:120vw;
    height:120vh;
    transform:translate(-50%,-50%) scale(1.2);
    border:none;
    pointer-events:none; /* hides youtube controls */
}

/* logo */

.logo{
    position:absolute;
    top:20px;
    right:20px;
    z-index:5;
}

.logo img{
    width:130px;
}

/* breaking label */

.breaking{
    position:absolute;
    bottom:0;
    left:0;
    background:black;
    color:yellow;
    padding:10px 20px;
    font-weight:bold;
    z-index:6;
}
/* Mobile landscape view */

@media screen and (max-width:768px) and (orientation:portrait){

body{
    transform:rotate(90deg);
    transform-origin:left top;
    width:100vh;
    height:100vw;
    overflow:hidden;
    position:absolute;
    top:100%;
    left:0;
}

}

/* ticker */

.ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:red;
    color:white;
    font-size:22px;
    font-weight:bold;
    padding:10px 0;
    overflow:hidden;
}
.sound-btn{
    position:absolute;
    top:90px;
    left:20px;
    z-index:10;
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    font-size:18px;
    cursor:pointer;
}

.ticker-text{
    display:inline-block;
    white-space:nowrap;
    animation:scroll 20s linear infinite;
}
.video-container{
    position:fixed;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

@keyframes scroll{
    from{ transform:translateX(100%); }
    to{ transform:translateX(-100%); }
}

</style>
</head>

<body>

<div class="video-container">

<iframe
src="https://www.youtube.com/embed/sIv6YmBeO3Q?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1"
allow="autoplay"
allowfullscreen>
</iframe>
<button class="sound-btn" onclick="unmute()">🔊</button>


<div class="logo">
<img src="logo.jpeg">
</div>

<div class="breaking">BREAKING NEWS</div>

<div class="ticker">
<div class="ticker-text">

wintage developers | 
Best Business Software Service provider | 
@Guntur | 
New technology , Highly Scalable |
Contact +91 7386055404|
Email: wintagedevelopers4@gmail.com

</div>
</div>

</div>

</body>
</html>


<script>
function unmute(){
document.querySelector("iframe").src =
"https://www.youtube.com/embed/sIv6YmBeO3Q?autoplay=1&controls=0";
}
</script>
